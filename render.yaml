services:
  - type: web
    name: nexlearn-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_MODE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexlearn-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: nexlearn-frontend
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    healthCheckPath: /
    envVars:
      - key: API_UPSTREAM
        fromService:
          name: nexlearn-api
          type: web
          property: hostport

databases:
  - name: nexlearn-db
    plan: free
    databaseName: nexlearn
    user: nexlearn
